<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CHZZK Image Toggle</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <h1>치지직 이미지 차단</h1>
        <p>기능별 설정</p>
      </header>

      <section class="settings" aria-label="기능 설정">
        <label class="setting">
          <span>
            <span class="setting-title">이미지 숨김</span>
            <span class="setting-status" data-status="images">확인 중</span>
          </span>
          <span class="switch">
            <input data-setting="images" type="checkbox">
            <span class="track">
              <span class="thumb"></span>
            </span>
          </span>
        </label>

        <label class="setting">
          <span>
            <span class="setting-title">하이라이트 강조</span>
            <span class="setting-status" data-status="highlight">확인 중</span>
          </span>
          <span class="switch">
            <input data-setting="highlight" type="checkbox">
            <span class="track">
              <span class="thumb"></span>
            </span>
          </span>
        </label>

        <label class="setting">
          <span>
            <span class="setting-title">전체화면 클릭 차단</span>
            <span class="setting-status" data-status="fullscreenClickBlocker">확인 중</span>
          </span>
          <span class="switch">
            <input data-setting="fullscreenClickBlocker" type="checkbox">
            <span class="track">
              <span class="thumb"></span>
            </span>
          </span>
        </label>

        <label class="setting">
          <span>
            <span class="setting-title">하이라이트 카드만 보기</span>
            <span class="setting-status" data-status="highlightCardFilter">확인 중</span>
          </span>
          <span class="switch">
            <input data-setting="highlightCardFilter" type="checkbox">
            <span class="track">
              <span class="thumb"></span>
            </span>
          </span>
        </label>

        <label class="setting">
          <span>
            <span class="setting-title">재생 시간 숨김</span>
            <span class="setting-status" data-status="playTime">확인 중</span>
          </span>
          <span class="switch">
            <input data-setting="playTime" type="checkbox">
            <span class="track">
              <span class="thumb"></span>
            </span>
          </span>
        </label>

        <label class="setting">
          <span>
            <span class="setting-title">재생바 숨김</span>
            <span class="setting-status" data-status="playProgress">확인 중</span>
          </span>
          <span class="switch">
            <input data-setting="playProgress" type="checkbox">
            <span class="track">
              <span class="thumb"></span>
            </span>
          </span>
        </label>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
