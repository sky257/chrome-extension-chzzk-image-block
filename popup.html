<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CHZZK Image Toggle</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <div>
        <h1>치지직 이미지</h1>
        <p id="status">상태 확인 중</p>
      </div>

      <label class="switch" aria-label="이미지 숨김 토글">
        <input id="toggle" type="checkbox">
        <span class="track">
          <span class="thumb"></span>
        </span>
      </label>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
